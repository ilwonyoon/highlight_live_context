name: Brief
options:
  bundleIdPrefix: ing.highlight
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: Brief/Info.plist
    # NOTE (privacy-control worktree only): renamed to BriefPrivacy / .brief.privacy
    # so this build is a DISTINCT app from the Live Context build in the other
    # worktree — killing/launching it never touches the other one. Revert these
    # two lines (PRODUCT_BUNDLE_IDENTIFIER + PRODUCT_NAME below) at merge time.
    PRODUCT_BUNDLE_IDENTIFIER: ing.highlight.brief.privacy
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEAD_CODE_STRIPPING: YES
    ENABLE_HARDENED_RUNTIME: YES
    ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: NO
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
targets:
  Brief:
    type: application
    platform: macOS
    sources:
      - path: Brief
        excludes:
          - "Resources/Fonts/**"
          - "Resources/Icons/**"
          - "Resources/Mocks/**"
          - "Info.plist"
          - "**/.claude/**"
          - "**/.claude"
      - path: Brief/Resources/Fonts
        type: folder
      - path: Brief/Resources/Icons
        type: folder
        excludes: [".claude", ".claude/**"]
      - path: Brief/Resources/Mocks
        type: folder
        excludes: [".claude", ".claude/**"]
    info:
      path: Brief/Info.plist
      properties:
        # Makes bundled fonts (Resources/Fonts) load at runtime. Declared
        # here so it survives `xcodegen generate` (previously it lived only
        # in the hand-edited plist and got stripped on regen).
        ATSApplicationFontsPath: Fonts/
        NSHumanReadableCopyright: "Brief — Highlight take-home prototype"
    settings:
      base:
        INFOPLIST_FILE: Brief/Info.plist
        PRODUCT_NAME: BriefPrivacy   # privacy-control worktree only — see note above
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
